<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <title>Pure Link</title>
    
    <link rel="icon" href="image_10.png">
    <link rel="apple-touch-icon" href="image_10.png">

    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background-color: #fff; display: flex; justify-content: center; padding: 20px; margin: 0; color: #111; -webkit-font-smoothing: antialiased; }
        .container { width: 100%; max-width: 380px; min-height: 98vh; display: flex; flex-direction: column; }
        h1 { font-size: 1.7rem; font-weight: 800; letter-spacing: -0.8px; margin: 25px 0 5px; }
        .subtitle { font-size: 0.85rem; color: #666; margin-bottom: 35px; }
        
        /* 入力エリア */
        .input-group { position: relative; margin-bottom: 20px; }
        .input-box { width: 100%; padding: 18px; border: 1px solid #ddd; border-radius: 15px; box-sizing: border-box; font-size: 16px; outline: none; transition: 0.2s; -webkit-appearance: none; }
        .input-box:focus { border-color: #111; }
        
        /* メインボタン */
        .btn-main { width: 100%; padding: 18px; background-color: #111; color: white; border: none; border-radius: 15px; font-size: 16px; font-weight: 700; cursor: pointer; margin-bottom: 30px; transition: 0.2s; -webkit-appearance: none; }
        .btn-main:active { transform: scale(0.98); opacity: 0.8; }
        
        /* 結果表示カード */
        #result-area { display: none; animation: fadeIn 0.4s ease; }
        .card { background: #f9f9f9; padding: 22px; border-radius: 15px; border: 1px solid #eee; position: relative; word-break: break-all; }
        .result-label { font-size: 0.7rem; font-weight: 800; color: #aaa; text-transform: uppercase; margin-bottom: 10px; display: block; }
        .cleaned-url { font-size: 0.95rem; color: #111; line-height: 1.5; font-weight: 500; }
        
        /* コピートースト */
        #toast { position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.85); color: white; padding: 12px 24px; border-radius: 25px; font-size: 0.8rem; display: none; z-index: 100; }

        footer { margin-top: auto; padding: 30px 0; text-align: center; font-size: 0.7rem; color: #aaa; line-height: 1.8; border-top: 1px solid #eee; }
        .install-btn { background: #f0f0f0; color: #111; border: none; padding: 10px 20px; border-radius: 20px; font-weight: 700; cursor: pointer; margin-bottom: 20px; font-size: 0.8rem; }
        
        #install-modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.6); z-index:1000; align-items: center; justify-content: center; }
        .modal-content { background: white; padding: 25px; border-radius: 16px; width: 85%; max-width: 300px; text-align: left; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
<div class="container">
    <h1>Pure Link</h1>
    <p class="subtitle">Remove tracking clutter from any URL.</p>
    
    <div class="input-group">
        <input type="text" id="url-in" class="input-box" placeholder="Paste long URL here..." onkeypress="if(event.key==='Enter') clean()">
    </div>
    
    <button class="btn-main" onclick="clean()">Clean & Copy</button>
    
    <div id="result-area">
        <div class="card">
            <span class="result-label">Pure URL</span>
            <div id="url-out" class="cleaned-url"></div>
        </div>
    </div>
    
    <footer>
        <button class="install-btn" onclick="showInstall()">📱 Add to Home Screen</button>
        <p>No login / No tracking / Browser only</p>
        <p>No server / No Ads</p>
        <p>Privacy Policy</p>
        <p style="margin-top: 15px;">Pure Link © 2026</p>
    </footer>
</div>

<div id="install-modal" onclick="hideInstall()">
    <div class="modal-content" onclick="event.stopPropagation()">
        <h2 style="font-size: 1.1rem; margin-top:0;">📱 Install</h2>
        <p style="font-size: 0.8rem; color: #555;"><strong>Safari:</strong> Tap Share > Add to Home Screen.<br><strong>Chrome:</strong> Tap Menu > Add to Home screen.</p>
    </div>
</div>

<div id="toast">Copied to clipboard!</div>

<script>
    function clean() {
        const input = document.getElementById('url-in').value.trim();
        if (!input) return;

        try {
            const url = new URL(input);
            // URLからクエリパラメータ(?以降)をバッサリ削除
            const cleanUrl = url.origin + url.pathname;
            
            const outArea = document.getElementById('result-area');
            const outText = document.getElementById('url-out');
            
            outText.innerText = cleanUrl;
            outArea.style.display = 'block';
            
            copyToClipboard(cleanUrl);
        } catch (e) {
            alert("Please enter a valid URL.");
        }
    }

    async function copyToClipboard(text) {
        try {
            await navigator.clipboard.writeText(text);
            const toast = document.getElementById('toast');
            toast.style.display = 'block';
            setTimeout(() => { toast.style.display = 'none'; }, 2000);
        } catch (err) {}
    }

    function showInstall() { document.getElementById('install-modal').style.display = 'flex'; }
    function hideInstall() { document.getElementById('install-modal').style.display = 'none'; }
</script>
</body>
</html>
