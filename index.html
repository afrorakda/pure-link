<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <title>Pure Link</title>
    
    <link rel="icon" href="image_4.png">
    <link rel="apple-touch-icon" href="image_4.png">

    <style>
        :root {
            --bg: #fff;
            --main: #111;
            --accent: #f0f0f0;
            --radius: 15px;
        }

        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: var(--bg); display: flex; justify-content: center; padding: 0; margin: 0; color: var(--main); -webkit-font-smoothing: antialiased; }
        .container { width: 100%; max-width: 420px; min-height: 100vh; display: flex; flex-direction: column; padding: 30px 20px; box-sizing: border-box; }
        
        header { margin-bottom: 35px; }
        h1 { font-size: 1.8rem; font-weight: 800; letter-spacing: -1px; margin-bottom: 5px; }
        .subtitle { font-size: 0.85rem; color: #666; font-weight: 500; }
        
        .input-group { margin-bottom: 15px; }
        .input-box { 
            width: 100%; padding: 20px; border: 1px solid #ddd; border-radius: var(--radius); 
            box-sizing: border-box; font-size: 16px; outline: none; background: #fafafa;
            transition: 0.2s; -webkit-appearance: none; 
        }
        .input-box:focus { border-color: var(--main); background: #fff; }
        
        .btn-group { display: flex; gap: 10px; margin-bottom: 30px; }
        .btn-main { flex: 3; padding: 20px; background-color: var(--main); color: white; border: none; border-radius: var(--radius); font-size: 1rem; font-weight: 800; cursor: pointer; transition: 0.2s; }
        .btn-clear { flex: 1; padding: 20px; background-color: var(--accent); color: #666; border: none; border-radius: var(--radius); font-size: 1rem; font-weight: 800; cursor: pointer; transition: 0.2s; }
        .btn-main:active, .btn-clear:active { transform: scale(0.96); opacity: 0.8; }
        
        #result-area { display: none; margin-bottom: 30px; animation: fadeIn 0.3s ease; }
        .card { background: #fafafa; padding: 25px; border-radius: var(--radius); border: 1px solid #eee; position: relative; word-break: break-all; cursor: pointer; }
        .result-label { font-size: 0.7rem; font-weight: 800; color: #bbb; text-transform: uppercase; margin-bottom: 10px; display: block; }
        .cleaned-url { font-size: 0.95rem; color: var(--main); line-height: 1.5; font-weight: 600; }
        
        footer { margin-top: auto; padding: 40px 0 20px; text-align: center; font-size: 0.75rem; color: #bbb; border-top: 1px solid #f5f5f5; }
        .kofi-btn { display: inline-block; background: var(--main); color: #fff; padding: 12px 24px; border-radius: var(--radius); text-decoration: none; font-weight: bold; margin-bottom: 20px; }
        .home-btn { background: var(--accent); color: var(--main); border: none; padding: 10px 20px; border-radius: 20px; font-size: 0.8rem; cursor: pointer; font-weight: 600; margin-bottom: 20px; }
        .footer-line { line-height: 1.8; }

        #toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.85); color: white; padding: 12px 24px; border-radius: 25px; font-size: 0.8rem; font-weight: bold; display: none; z-index: 100; }
        
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: #fff; padding: 30px; border-radius: 20px; max-width: 320px; width: 90%; position: relative; text-align: left; }
        .close-icon { position: absolute; top: 15px; right: 20px; font-size: 1.5rem; color: #aaa; cursor: pointer; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
<div class="container">
    <header>
        <h1>Pure Link</h1>
        <p class="subtitle">Remove tracking clutter safely.</p>
    </header>
    
    <div class="input-group">
        <input type="text" id="url-in" class="input-box" placeholder="Paste URL here..." autocomplete="off" spellcheck="false">
    </div>
    
    <div class="btn-group">
        <button class="btn-main" onclick="clean()">Clean & Copy</button>
        <button class="btn-clear" onclick="clearAll()">Clear</button>
    </div>
    
    <div id="result-area">
        <div class="card" onclick="copyResult()">
            <span class="result-label">Tap to Copy</span>
            <div id="url-out" class="cleaned-url"></div>
        </div>
    </div>
    
    <footer>
        <a href="https://ko-fi.com/afrorakda" target="_blank" class="kofi-btn">🍵 Support me on Ko-fi</a>
        <div>
            <button class="home-btn" id="homeBtn">Add to Home Screen</button>
        </div>
        <div class="footer-line">
            No login / No tracking / No ads / Browser only<br>
            Privacy Policy<br>
            <strong>afrorakda © 2026</strong>
        </div>
    </footer>
</div>

<div id="toast">Copied!</div>

<div id="modal" class="modal">
    <div class="modal-content">
        <span class="close-icon" id="closeModal">&times;</span>
        <h2 style="font-size: 1.2rem; margin-bottom: 20px;">📱 Install</h2>
        <p style="font-size: 0.9rem; color: #666; margin-bottom: 20px;">Add to home screen.</p>
        <div style="font-size: 0.85rem; line-height: 1.6;">
            <p>🍏 <strong>iPhone:</strong> Share > Add to Home Screen</p>
            <p style="margin-top:10px;">🤖 <strong>Android:</strong> Menu > Add to home screen</p>
        </div>
    </div>
</div>

<script>
    const trashParams = [
        'utm_source', 'utm_medium', 'utm_campaign', 'utm_term', 'utm_content', 'utm_id',
        'fbclid', 'gclid', 'msclkid', 'twclid', 'igshid', '_hsenc', '_hsmi', 'mc_cid', 'mc_eid',
        'ref', 'ref_', 's_kwcid', 'ncid', 'cmpid', 'webkit'
    ];

    function clean() {
        const input = document.getElementById('url-in').value.trim();
        if (!input) return;
        
        try {
            const url = new URL(input);
            const params = new URLSearchParams(url.search);
            
            // 安全なクリーニング: リストにあるゴミだけ消す
            trashParams.forEach(p => params.delete(p));
            
            // パラメータが空になったら ? も消す、残ってれば維持
            const newSearch = params.toString();
            const cleanUrl = url.origin + url.pathname + (newSearch ? '?' + newSearch : '');
            
            document.getElementById('url-out').innerText = cleanUrl;
            document.getElementById('result-area').style.display = 'block';
            copyToClipboard(cleanUrl);
        } catch (e) {
            alert("Please enter a valid URL.");
        }
    }

    function clearAll() {
        document.getElementById('url-in').value = '';
        document.getElementById('result-area').style.display = 'none';
        document.getElementById('url-in').focus();
    }

    function copyResult() {
        const text = document.getElementById('url-out').innerText;
        copyToClipboard(text);
    }

    async function copyToClipboard(text) {
        try {
            await navigator.clipboard.writeText(text);
            const toast = document.getElementById('toast');
            toast.style.display = 'block';
            setTimeout(() => { toast.style.display = 'none'; }, 1500);
        } catch (err) {}
    }

    document.getElementById('homeBtn').onclick = () => document.getElementById('modal').style.display = 'flex';
    document.getElementById('closeModal').onclick = () => document.getElementById('modal').style.display = 'none';
    window.onclick = (e) => { if (e.target == document.getElementById('modal')) document.getElementById('modal').style.display = 'none'; };
</script>
</body>
</html>
